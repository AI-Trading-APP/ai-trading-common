[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-trading-common"
version = "0.1.0"
description = "Shared logging and utilities for AI Trading App services"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "structlog>=24.1.0",
]

[tool.setuptools]
packages = ["ai_trading_common"]
