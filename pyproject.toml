[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-trading-common"
version = "0.1.0"
description = "Shared logging and utility package for AI Trading App services"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "structlog>=24.1.0",
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["ai_trading_common*"]
